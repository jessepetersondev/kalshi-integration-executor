services:
  rabbitmq:
    image: rabbitmq:3-management
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - kalshi_executor_rabbitmq_data:/var/lib/rabbitmq

  executor:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /workspace
    command: >-
      bash -lc "dotnet run --project src/Kalshi.Integration.Executor/Kalshi.Integration.Executor.csproj --configuration Release"
    environment:
      DOTNET_ENVIRONMENT: Development
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__VirtualHost: /
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__Exchange: kalshi.integration.events
      RabbitMq__ExchangeType: topic
      RabbitMq__ExecutorQueue: kalshi.integration.executor
      RabbitMq__ExecutorResultsQueue: kalshi.integration.executor.results
      RabbitMq__ExecutorDeadLetterQueue: kalshi.integration.executor.dlq
      RabbitMq__ExecutorResultsDeadLetterQueue: kalshi.integration.executor.results.dlq
      RabbitMq__RoutingKeyBinding: kalshi.integration.trading.#
      RabbitMq__ResultsRoutingKeyBinding: kalshi.integration.results.#
      RabbitMq__ClientProvidedName: kalshi-integration-executor
      Integrations__KalshiApi__BaseUrl: https://api.elections.kalshi.com
      Integrations__KalshiApi__TimeoutSeconds: "10"
      Integrations__KalshiApi__RetryAttempts: "2"
      Integrations__KalshiApi__AccessKeyIdEnvironmentVariable: KALSHI_ACCESS_KEY_ID
      Integrations__KalshiApi__PrivateKeyPemEnvironmentVariable: KALSHI_PRIVATE_KEY_PEM
      Integrations__KalshiApi__PrivateKeyPemBase64EnvironmentVariable: KALSHI_PRIVATE_KEY_PEM_BASE64
      Integrations__KalshiApi__PrivateKeyPathEnvironmentVariable: KALSHI_PRIVATE_KEY_PATH
      KALSHI_ACCESS_KEY_ID: ${KALSHI_ACCESS_KEY_ID:-}
      KALSHI_PRIVATE_KEY_PEM: ${KALSHI_PRIVATE_KEY_PEM:-}
      KALSHI_PRIVATE_KEY_PEM_BASE64: ${KALSHI_PRIVATE_KEY_PEM_BASE64:-}
      KALSHI_PRIVATE_KEY_PATH: ${KALSHI_PRIVATE_KEY_PATH:-}
      FailureHandling__MaxRetryAttempts: "3"
      FailureHandling__BaseDelayMilliseconds: "250"
      Persistence__ConnectionString: Data Source=/workspace/data/kalshi-integration-executor.db
      RiskControls__LiveExecutionEnabled: "true"
      RiskControls__KillSwitchEnabled: "false"
      RiskControls__MaxOrderQuantity: "5"
      RiskControls__MaxLimitPriceDollars: "1.0"
      RiskControls__MaxOrderNotionalDollars: "5.0"
      RiskControls__MaxDailyNotionalDollars: "25.0"
      RiskControls__AllowedTickerPrefixes__0: KXBTC-
    depends_on:
      - rabbitmq
    volumes:
      - ./:/workspace

volumes:
  kalshi_executor_rabbitmq_data:
